<!doctype html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | CenterShip Financeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <style>
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(91,141,238,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(245,197,66,0.12) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(155,127,232,0.07) 0%, transparent 55%),
        #04060f;
      background-attachment: fixed;
    }
    .login-wrap {
      width: min(460px, 100%);
      animation: fadeUp .5s cubic-bezier(0.4,0,0.2,1);
    }
    .login-card {
      padding: 36px;
      border-radius: 24px;
    }
    .login-logo {
      max-height: 52px;
      width: auto;
      display: block;
      margin-bottom: 32px;
      border-radius: 10px;
    }
    .login-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }
    .login-sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 28px;
    }
    .form-stack { display: grid; gap: 14px; }
    .field input {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      color: var(--fg);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      width: 100%;
      min-height: 48px;
      transition: all var(--transition);
    }
    .field input:focus {
      outline: none;
      border-color: rgba(245,197,66,0.4);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 3px rgba(245,197,66,0.08);
    }
    .field input::placeholder { color: rgba(200,210,240,0.3); }
    .field label { color: rgba(200,210,240,0.5); font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
    .btn-login {
      width: 100%;
      min-height: 50px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, #f5c542, #f5a623);
      color: #0d0d0d;
      border: none;
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: 0 4px 24px rgba(245,197,66,0.35);
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(245,197,66,0.5); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }
    .divider span { color: var(--muted); font-size: 12px; }
    .signup-toggle { margin-top: 6px; }
    .signup-toggle summary { cursor: pointer; color: rgba(245,197,66,0.8); font-size: 13px; font-weight: 600; list-style: none; text-align: center; padding: 10px; }
    .signup-toggle summary::-webkit-details-marker { display: none; }
    .signup-toggle[open] summary::after { content: ' ↑'; }
    .signup-toggle summary::after { content: ' ↓'; }
    .signup-form { padding-top: 14px; display: grid; gap: 12px; border-top: 1px solid var(--glass-border); margin-top: 8px; }
    .login-footer { text-align: center; margin-top: 20px; color: var(--muted); font-size: 12px; }
    .glow-orb {
      position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: -1;
    }
  </style>
</head>
<body>
  <!-- Ambient orbs -->
  <div class="glow-orb" style="width:400px;height:400px;background:rgba(91,141,238,0.08);top:-100px;left:-100px"></div>
  <div class="glow-orb" style="width:350px;height:350px;background:rgba(245,197,66,0.06);bottom:-80px;right:-80px"></div>

  <div class="login-wrap">
    <div class="login-card glass-strong">
      <img class="login-logo"
        src="public/images/brand/novo-logo.png"
        alt="CenterShip Elevadores"
        onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'">
      <div id="logo-fallback" style="display:none;align-items:center;gap:10px;margin-bottom:28px">
        <div class="logo-mark" style="width:44px;height:44px;font-size:16px">CS</div>
        <div>
          <div style="font-weight:800;font-size:15px">CenterShip</div>
          <div style="color:var(--muted);font-size:12px">Financeiro</div>
        </div>
      </div>

      <h1 class="login-title">Bem-vindo de volta 👋</h1>
      <p class="login-sub">Acesse o sistema financeiro interno da CenterShip Elevadores.</p>

      <form class="form-stack" data-login-form>
        <div class="field">
          <label>E-mail</label>
          <input name="email" type="email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="field">
          <label>Senha</label>
          <input name="password" type="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button class="btn-login" type="submit">Entrar no sistema</button>
      </form>

      <div class="divider"><span>ou</span></div>

      <details class="signup-toggle">
        <summary>Criar nova conta de acesso</summary>
        <form class="signup-form" data-signup-form>
          <div class="field">
            <label>Nome completo</label>
            <input name="name" placeholder="Seu nome" required>
          </div>
          <div class="field">
            <label>E-mail</label>
            <input name="email" type="email" placeholder="seu@email.com" required>
          </div>
          <div class="field">
            <label>Senha</label>
            <input name="password" type="password" placeholder="Mínimo 8 caracteres" required minlength="8">
          </div>
          <div class="field">
            <label>Perfil</label>
            <select name="profile" style="background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);color:var(--fg);border-radius:12px;padding:12px 16px;min-height:48px;width:100%">
              <option value="financeiro">Financeiro</option>
              <option value="admin">Administrador</option>
              <option value="colaborador">Colaborador</option>
            </select>
          </div>
          <button class="btn-login" type="submit" style="background:rgba(91,141,238,0.2);color:#5b8dee;box-shadow:0 4px 20px rgba(91,141,238,0.15)">Criar conta</button>
        </form>
      </details>
    </div>

    <p class="login-footer">CenterShip Elevadores · Sistema financeiro interno · <span id="year"></span></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
